# Build and test MosaicKit on macOS and iOS.
#
# macOS  → swift build + swift test   (direct toolchain, fastest path)
# iOS    → xcodebuild against Simulator (swift build is host-only; cross-
#           compilation to iOS requires Xcode's full toolchain)
#
# References:
#   https://www.cocoanetics.com/2026/04/four-green-checkmarks-github-ci-for-macos-ios-linux-and-windows/
#   https://github.com/actions/runner-images/issues/13143  (iOS hang workaround)

name: Swift

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ── macOS ──────────────────────────────────────────────────────────────────────
jobs:
  macos:
    name: macOS
    runs-on: macos-26
    timeout-minutes: 30
    env:
      MOSAICKIT_SUITE_MODE: none

    steps:
      - uses: actions/checkout@v4

      # Pin to latest stable Xcode on macOS 26.
      # maxim-lobanov/setup-xcode is the recommended action for this.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: macos-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: macos-spm-

      # Split build and test for cleaner CI timings.
      # --build-tests compiles test targets; --skip-build reuses them.
      - name: Build (incl. test targets)
        run: swift build --build-tests -v

#     - name: Test
      #  run: swift test --skip-build --parallel

  # ── iOS Simulator ───────────────────────────────────────────────────────────
  ios:
    name: iOS Simulator
    runs-on: macos-26
    timeout-minutes: 40
    env:
      MOSAICKIT_SUITE_MODE: none

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode version
        run: xcodebuild -version

      # Diagnostic: print available iPhone simulators so the destination
      # string can be verified if the job fails.
      - name: Available iPhone simulators
        run: |
          xcrun simctl list devices available --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)['devices']
          for runtime, devices in data.items():
              iphones = [d['name'] for d in devices
                         if 'iPhone' in d.get('name', '') and d.get('isAvailable')]
              if iphones:
                  print(runtime, '->', iphones[:4])
          "

      # List auto-generated package schemes (for debugging scheme name issues).
      - name: List xcodebuild schemes
        run: xcodebuild -list 2>&1 || true

      - name: Cache SwiftPM (iOS DerivedData)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ios-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: ios-spm-

      # build-for-testing / test-without-building is the xcodebuild analogue
      # of swift build --build-tests / swift test --skip-build.
      #
      # Flags:
      #   -skipPackagePluginValidation   suppress plugin-sandbox warnings
      #   -parallel-testing-enabled NO   workaround for macos-26 iOS hang (#13143)
      #   -derivedDataPath               share DerivedData between both steps
      #   CODE_SIGNING_ALLOWED=NO        skip signing (unnecessary on CI)
      #   SWIFT_STRICT_CONCURRENCY=complete  enforce Swift 6 actor isolation
      - name: Build for Testing (iOS Simulator)
        run: |
          xcodebuild build-for-testing \
            -scheme MosaicKit-Package \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            -skipPackagePluginValidation \
            -parallel-testing-enabled NO \
            -derivedDataPath ~/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=complete

      - name: Test (iOS Simulator)
        run: |
          xcodebuild test-without-building \
            -scheme MosaicKit-Package \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            -skipPackagePluginValidation \
            -parallel-testing-enabled NO i\
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 120 \
            -derivedDataPath ~/DerivedData \
            CODE_SIGNING_ALLOWED=NO
